<script>
// ══════════════════════════════════════════════════════════════
// MAIN PAGE INIT (harus global agar bisa dipanggil setelah decrypt)
// ══════════════════════════════════════════════════════════════
function initMainPage() {
  // Progress bar
  const bar  = document.getElementById('progress-bar');
  if (bar) {
    const scrollBtn = document.getElementById('bab-scroll-btn');
    const scrollSep = document.getElementById('bab-scroll-sep');
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const total    = document.body.scrollHeight - window.innerHeight;
      bar.style.width = (scrolled / total * 100) + '%';
      const show = scrolled > 400;
      if (scrollBtn) scrollBtn.classList.toggle('visible', show);
      if (scrollSep) scrollSep.classList.toggle('visible', show);
    });
  }

  // Hamburger menu
  const hamburger = document.getElementById('hamburger');
  const sidebar   = document.getElementById('sidebar');
  const overlay   = document.getElementById('overlay');
  if (hamburger && sidebar && overlay) {
    function closeSidebar() {
      hamburger.classList.remove('open');
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    }
    hamburger.addEventListener('click', () => {
      const isOpen = sidebar.classList.contains('open');
      isOpen ? closeSidebar() : (hamburger.classList.add('open'), sidebar.classList.add('open'), overlay.classList.add('open'));
    });
    overlay.addEventListener('click', closeSidebar);
    document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => {
      if (window.innerWidth <= 900) closeSidebar();
    }));
  }

  // Active nav highlight
  const navItems = document.querySelectorAll('.nav-item');
  const sections = document.querySelectorAll('[id]');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navItems.forEach(n => n.classList.remove('active'));
        const link = document.querySelector(`.nav-item[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  sections.forEach(s => obs.observe(s));


  // ── BAB Indicator — liquid glass kapsul bawah tengah
  (function() {
    const indicator  = document.getElementById('bab-indicator');
    const glass      = document.getElementById('bab-indicator-glass');
    const labelEl    = document.getElementById('bab-active-label');
    const dotsWrap   = document.getElementById('bab-dots');
    if (!indicator || !glass || !labelEl || !dotsWrap) return;

    const babs = [
      { id: 'cover',   label: 'Cover' },
      { id: 'bab1',    label: 'BAB I — Pembagian Pengurus' },
      { id: 'bab2',    label: 'BAB II — Alur Koordinasi' },
      { id: 'bab3',    label: 'BAB III — Kewenangan Struktur' },
      { id: 'bab4',    label: 'BAB IV — Batasan Kewenangan' },
      { id: 'bab5',    label: 'BAB V — Kewenangan Anggota' },
      { id: 'bab6',    label: 'BAB VI — Sistem Evaluasi' },
      { id: 'bab7',    label: 'BAB VII — Prosedur Program' },
      { id: 'penutup', label: 'Penutup' },
    ];

    // ── Dropdown
    const dropdown = document.createElement('div');
    dropdown.id = 'bab-dropdown';

    const ddItems = babs.map((b, i) => {
      // Separator sebelum Penutup
      if (b.id === 'penutup') {
        const sep = document.createElement('div');
        sep.className = 'bab-dd-sep';
        dropdown.appendChild(sep);
      }
      const item = document.createElement('div');
      item.className = 'bab-dd-item';
      item.innerHTML = '<span class="bab-dd-dot"></span>' + b.label;
      item.addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById(b.id)?.scrollIntoView({ behavior: 'smooth' });
        closeDropdown();
      });
      dropdown.appendChild(item);
      return item;
    });
    indicator.appendChild(dropdown); // outside glass to avoid stacking-context blur issue

    // ── Mini dots (hanya BAB 1-7, skip cover & penutup)
    const babOnly = babs.filter(b => b.id.startsWith('bab'));
    const miniDots = babOnly.map(b => {
      const d = document.createElement('div');
      d.className = 'bab-mini-dot';
      d.title = b.label;
      d.addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById(b.id)?.scrollIntoView({ behavior: 'smooth' });
      });
      dotsWrap.appendChild(d);
      return d;
    });

    // ── Dropdown toggle
    let ddOpen = false;
    function openDropdown() {
      ddOpen = true;
      requestAnimationFrame(() => dropdown.classList.add('open'));
    }
    function closeDropdown() {
      ddOpen = false;
      dropdown.classList.remove('open');
    }
    // ── Zone-based click: tentukan zona berdasarkan posisi X klik
    // Glass layout (kiri→kanan): [dots][sep][dot][label][scroll-sep][scroll-btn][theme-sep][theme-btn]
    glass.addEventListener('click', e => {
      const t = e.target;

      // Klik langsung di tombol — jalankan aksi tombol, jangan dropdown
      if (t.closest('#bab-scroll-btn')) return;
      if (t.closest('#bab-theme-btn'))  return;
      if (t.closest('.bab-mini-dot'))   return;

      // Tentukan zona berdasarkan posisi X relatif terhadap elemen kapsul
      const scrollSep  = document.getElementById('bab-scroll-sep');
      const themeSep   = document.getElementById('bab-theme-sep');
      const scrollBtn  = document.getElementById('bab-scroll-btn');
      const themeBtn   = document.getElementById('bab-theme-btn');

      const clickX = e.clientX;

      // Batas zona: kiri scroll-sep → area label/dropdown
      //             kiri theme-sep  → area scroll (klik → scroll to top)
      //             kanan theme-sep → area theme  (klik → toggle theme)
      const scrollSepX = scrollSep ? scrollSep.getBoundingClientRect().left : Infinity;
      const themeSepX  = themeSep  ? themeSep.getBoundingClientRect().left  : Infinity;

      if (clickX >= themeSepX) {
        // Zona theme toggle
        if (themeBtn) themeBtn.click();
      } else if (clickX >= scrollSepX) {
        // Zona scroll to top
        if (scrollBtn) scrollBtn.click();
      } else {
        // Zona label/dropdown
        ddOpen ? closeDropdown() : openDropdown();
      }
    });
    document.addEventListener('click', e => { if (!glass.contains(e.target)) closeDropdown(); });

    // ── Slide-up animation — dikontrol CSS transition via .shown class
    let isShown = false;

    function showIndicator() {
      if (isShown) return;
      isShown = true;
      indicator.classList.add('shown');
    }

    function hideIndicator() {
      if (!isShown) return;
      isShown = false;
      indicator.classList.remove('shown');
    }

    let activeIdx = -1;

    function setActive(idx) {
      if (idx === activeIdx) return;
      activeIdx = idx;
      const b = babs[idx];

      // Hide saat di cover, show saat bab1+
      if (b.id === 'cover') { hideIndicator(); }
      else { showIndicator(); }

      // Mini dots — index dalam babOnly
      const babIdx = babOnly.findIndex(x => x.id === b.id);
      miniDots.forEach((d, i) => d.classList.toggle('active', i === babIdx));

      // Dropdown active
      ddItems.forEach((d, i) => d.classList.toggle('active', i === idx));

      // Label animasi
      labelEl.classList.add('changing');
      setTimeout(() => {
        labelEl.textContent = b.label;
        labelEl.classList.remove('changing');
      }, 180);
    }

    // ── Dark bg detection (cover & penutup)
    const darkIds = ['cover', 'penutup'];
    function checkDarkBg() {
      const triggerY = window.scrollY + window.innerHeight * 0.88;
      let onDark = false;
      darkIds.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const r   = el.getBoundingClientRect();
        const top = window.scrollY + r.top;
        const bot = top + r.height;
        if (triggerY >= top && triggerY <= bot) onDark = true;
      });
      glass.classList.toggle('on-dark', onDark);
      indicator.classList.toggle('on-dark', onDark);
    }
    window.addEventListener('scroll', checkDarkBg, { passive: true });
    checkDarkBg();

    // ── IntersectionObserver ratio-based
    const visibleRatios = {};
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { visibleRatios[e.target.id] = e.intersectionRatio; });
      let best = -1, bestRatio = 0;
      babs.forEach((b, i) => {
        const r = visibleRatios[b.id] || 0;
        if (r > bestRatio) { bestRatio = r; best = i; }
      });
      if (best >= 0) setActive(best);
    }, {
      threshold: [0, 0.05, 0.1, 0.2, 0.35, 0.5, 0.7, 1.0],
      rootMargin: '0px 0px -15% 0px'
    });

    babs.forEach(b => {
      const el = document.getElementById(b.id);
      if (el) obs.observe(el);
    });
  })();

  // ── Dark Mode Toggle — init kapsul setelah main page siap
  const sep = document.getElementById('bab-theme-sep');
  if (sep) sep.classList.add('visible');
  // Sync emoji bab-theme-btn
  const babThemeBtn = document.getElementById('bab-theme-btn');
  if (babThemeBtn) babThemeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
  // capture click untuk bab-theme-btn
  document.addEventListener('click', e => {
    if (e.target && (e.target.id === 'bab-theme-btn' || e.target.closest('#bab-theme-btn'))) {
      e.stopPropagation();
      window.doThemeTransition(!document.body.classList.contains('dark'));
    }
  }, true);


  // Scroll reveal
  const revealSelectors = [
    '.bab-header','.sub-section','.prose','.callout','.card','.sekbid-card',
    '.timeline','.step-flow','.step-flow-v','.diagram-wrap','.principle-block',
    '.eval-grid','.table-wrap','.divider','.flow','.closing',
  ];
  const textRevealSelectors = [
    'h4.label','.list','.list li','.tl-item','.tl-title','.tl-body','.p-item',
    '.prose p','.closing p','.closing ul li','.card ul li','.sekbid-col ul li',
    '.chip','.cover-tag','.cover-scroll','.sf-step','.flow-step','.fh-step',
    '.sfv-item','.eval-card','.bab-label','table tr','.card-attention','.flow-h',
  ];

  document.querySelectorAll('.cards').forEach(g => g.classList.add('reveal-group'));
  document.querySelectorAll('.eval-grid').forEach(g => g.classList.add('reveal-group'));
  document.querySelectorAll('.principle-grid').forEach(g => g.classList.add('reveal-group'));

  revealSelectors.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      if (!el.closest('.reveal-group') && !el.closest('.reveal')) el.classList.add('reveal');
    });
  });
  textRevealSelectors.forEach((sel) => {
    document.querySelectorAll(sel).forEach((el, i) => {
      if (el.closest('.reveal-group') || el.classList.contains('reveal')) return;
      const parentReveal = el.closest('.reveal');
      if (parentReveal && !parentReveal.classList.contains('reveal-group')) return;
      el.classList.add('reveal');
      el.style.transitionDelay = (i * 0.04) + 's';
    });
  });

  const revealObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        entry.target.querySelectorAll(':scope > *').forEach(child => child.classList.add('revealed'));
        revealObs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('.reveal, .reveal-group').forEach(el => revealObs.observe(el));
}

// ══════════════════════════════════════════════════════════════
// DARK MODE — Global theme engine (tersedia sejak halaman load)
// Diakses dari lock screen maupun main page
// ══════════════════════════════════════════════════════════════
(function() {
  const rpl = document.getElementById('theme-ripple');
  let animating = false;

  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    // Update semua tombol theme
    ['bab-theme-btn','lock-theme-btn'].forEach(id => {
      const b = document.getElementById(id);
      if (b) b.textContent = dark ? '☀️' : '🌙';
    });
  }

  function doTransition(dark) {
    if (animating || !rpl) { applyTheme(dark); return; }
    animating = true;

    // Pilih tombol yang aktif saat ini sebagai origin ripple
    const btn = document.getElementById('lock-theme-btn') &&
                document.getElementById('lock-screen') &&
                document.getElementById('lock-screen').style.display !== 'none'
      ? document.getElementById('lock-theme-btn')
      : document.getElementById('bab-theme-btn');

    const rect = btn ? btn.getBoundingClientRect()
                     : { left: window.innerWidth-50, top: window.innerHeight-50, width:38, height:38 };
    const rx = ((rect.left + rect.width/2)  / window.innerWidth  * 100).toFixed(1) + '%';
    const ry = ((rect.top  + rect.height/2) / window.innerHeight * 100).toFixed(1) + '%';
    const oldBg = dark ? '#f9f9f7' : '#0e1117';
    const newBg = dark ? '#0e1117' : '#f9f9f7';

    rpl.style.cssText = '';
    rpl.style.setProperty('--rx', rx);
    rpl.style.setProperty('--ry', ry);
    rpl.style.background = oldBg;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      rpl.classList.add('ripple-expand', 'ripple-full');
      setTimeout(() => {
        applyTheme(dark);
        rpl.style.transition = 'none';
        rpl.style.background = newBg;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          rpl.classList.remove('ripple-full', 'ripple-expand');
          rpl.classList.add('ripple-collapse');
          setTimeout(() => {
            rpl.classList.remove('ripple-collapse');
            rpl.style.cssText = '';
            animating = false;
          }, 560);
        }));
      }, 370);
    }));
  }

  // Expose ke global
  window.doThemeTransition = doTransition;

  // Default: day mode
  applyTheme(false);

  // Lock screen button — tersedia langsung saat DOM siap
  const lockBtn = document.getElementById('lock-theme-btn');
  if (lockBtn) {
    lockBtn.addEventListener('click', () => {
      doTransition(!document.body.classList.contains('dark'));
    });

    // Posisikan tombol di tengah antara card bottom dan layar bottom
    function positionLockBtn() {
      const card = document.getElementById('lock-card');
      if (!card) return;
      const cardRect   = card.getBoundingClientRect();
      const cardBottom = cardRect.bottom;
      const screenH    = window.innerHeight;
      const midY = cardBottom + (screenH - cardBottom) / 2 - 10;
      lockBtn.style.top = midY + 'px';
      lockBtn.style.marginTop = '-22px';
    }
    positionLockBtn();
    window.addEventListener('resize', positionLockBtn);
    // Slide up dari bawah layar
    lockBtn.style.opacity = '0';
    lockBtn.style.transform = 'translateX(-50%) translateY(120px)';
    lockBtn.style.transition = 'none';
    setTimeout(() => {
      positionLockBtn();
      lockBtn.style.transition = 'opacity 0.45s cubic-bezier(0.22,1,0.36,1), transform 0.45s cubic-bezier(0.22,1,0.36,1)';
      lockBtn.style.opacity = '1';
      lockBtn.style.transform = 'translateX(-50%) translateY(0)';
    }, 800);
  }
})();

// ══════════════════════════════════════════════════════════════
// LOCK SCREEN — AES-256-GCM + PBKDF2-SHA256 (310,000 iterations)
// Konten halaman dienkripsi. Password tidak tersimpan di kode.
// ══════════════════════════════════════════════════════════════
(function() {

  // ══════════════════════════════════════════════════════════════
  // CUSTOM SHAPE PASSWORD INPUT
  // ══════════════════════════════════════════════════════════════

  // Vibrant — cerah dan kuat, sesuai tema IRMA
  const COLORS = [
    '#00b96b', // vibrant emerald
    '#1a8fff', // electric blue
    '#c849ff', // vivid purple
    '#ff7a00', // vivid orange
    '#e6c200', // golden yellow
    '#ff2d6b', // hot pink
    '#00c4b4', // vivid teal
    '#76d400', // lime green
  ];

  // Shape SVG — semua sudut memakai cubic bezier untuk lekukan sempurna
  const SHAPES = [

    // 1. Lingkaran sempurna
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="${c}"/></svg>`,

    // 2. Squircle (rounded square super smooth — ios icon style)
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C10.5,1 13,3.5 13,7 C13,10.5 10.5,13 7,13 C3.5,13 1,10.5 1,7 C1,3.5 3.5,1 7,1 Z" fill="${c}"/></svg>`,

    // 3. Diamond rounded
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C7.9,1 9.5,3.2 12,7 C9.5,10.8 7.9,13 7,13 C6.1,13 4.5,10.8 2,7 C4.5,3.2 6.1,1 7,1 Z" fill="${c}"/></svg>`,

    // 4. Segitiga rounded
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1.5 C7.7,1.5 8.3,2.1 11.8,11 C11.4,12 10.5,12.5 7,12.5 C3.5,12.5 2.6,12 2.2,11 C5.7,2.1 6.3,1.5 7,1.5 Z" fill="${c}"/></svg>`,

    // 5. Bintang 4 titik
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C7.4,3.2 7.4,5 7,7 C9.2,6.6 11,6.6 13,7 C11,7.4 9.2,7.4 7,7 C7.4,8.8 7.4,10.8 7,13 C6.6,10.8 6.6,8.8 7,7 C4.8,7.4 3,7.4 1,7 C3,6.6 4.8,6.6 7,7 C6.6,5 6.6,3.2 7,1 Z" fill="${c}"/></svg>`,

    // 6. Teardrop
    (c) => `<svg width="12" height="14" viewBox="0 0 12 14"><path d="M6,1 C8.5,3 11,6 11,9 C11,11.8 8.8,13 6,13 C3.2,13 1,11.8 1,9 C1,6 3.5,3 6,1 Z" fill="${c}"/></svg>`,

    // 7. Hexagon rounded
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,1 C8,1 10.5,2.5 12.5,4.8 C13,5.8 13,8.2 12.5,9.2 C10.5,11.5 8,13 7,13 C6,13 3.5,11.5 1.5,9.2 C1,8.2 1,5.8 1.5,4.8 C3.5,2.5 6,1 7,1 Z" fill="${c}"/></svg>`,

    // 8. Plus/cross rounded
    (c) => `<svg width="14" height="14" viewBox="0 0 14 14"><rect x="5" y="1" width="4" height="12" rx="2" fill="${c}"/><rect x="1" y="5" width="12" height="4" rx="2" fill="${c}"/></svg>`,
  ]

  const shapeOverlay  = document.getElementById('lock-shape-overlay');
  const realInput     = document.getElementById('lock-input');
  const shapePlaceholder = document.getElementById('lock-shape-placeholder');

  let showChars = false;
  let shapeAssignments = [];

  function getAssignment(index) {
    if (shapeAssignments[index]) return shapeAssignments[index];
    const shapeIdx = (index * 3 + 7) % SHAPES.length;
    const colorIdx = (index * 5 + 2) % COLORS.length;
    shapeAssignments[index] = { shapeIdx, colorIdx };
    return shapeAssignments[index];
  }

  function renderOverlay() {
    const val       = realInput.value;
    const len       = val.length;
    const selStart  = realInput.selectionStart ?? len;
    const selEnd    = realInput.selectionEnd   ?? len;
    const hasSelect = selStart !== selEnd;

    // Tampilkan/sembunyikan placeholder
    shapePlaceholder.style.display = len === 0 ? '' : 'none';

    // Bersihkan overlay, isi ulang
    shapeOverlay.innerHTML = '';

    for (let i = 0; i < len; i++) {
      // Sisipkan kursor visual di posisi selStart (awal seleksi / posisi kursor)
      if (!hasSelect && i === selStart) {
        shapeOverlay.appendChild(makeCursor());
      }

      const token = document.createElement('span');
      token.className = 'shape-token';

      // Tandai token yang termasuk dalam seleksi
      if (hasSelect && i >= selStart && i < selEnd) {
        token.classList.add('selected');
      }

      if (showChars) {
        token.classList.add('show-char');
        token.textContent = val[i];
      } else {
        const { shapeIdx, colorIdx } = getAssignment(i);
        token.innerHTML = SHAPES[shapeIdx](COLORS[colorIdx]);
      }
      shapeOverlay.appendChild(token);
    }

    // Kursor di akhir (hanya jika tidak ada seleksi aktif)
    if (!hasSelect && selStart >= len) {
      shapeOverlay.appendChild(makeCursor());
    }

    // Scroll overlay agar kursor / akhir seleksi selalu terlihat
    requestAnimationFrame(scrollToCursor);
  }

  function makeCursor() {
    const c = document.createElement('span');
    c.id = 'lock-cursor-blink';
    c.style.cssText = 'display:inline-block;width:2px;height:18px;background:#2d6a4f;border-radius:2px;flex-shrink:0;animation:cursorBlink 1s step-end infinite;vertical-align:middle;';
    return c;
  }

  function scrollToCursor() {
    // Gunakan token terakhir yang selected sebagai anchor, fallback ke cursor
    const selectedTokens = shapeOverlay.querySelectorAll('.shape-token.selected');
    const anchorEl  = selectedTokens.length
      ? selectedTokens[selectedTokens.length - 1]
      : document.getElementById('lock-cursor-blink');
    const cursorEl  = anchorEl;
    const displayEl = document.getElementById('lock-shape-display');
    if (!cursorEl || !displayEl || !shapeOverlay) return;

    // Lebar area visible = display - padding kiri - padding kanan (tombol mata)
    const visibleW   = displayEl.clientWidth - 20 - 52;
    // Total lebar konten overlay
    const contentW   = shapeOverlay.scrollWidth;
    // Posisi kursor relatif terhadap overlay (tanpa transform)
    const curTx      = getCurrentTx();
    const cursorLeft = cursorEl.offsetLeft + curTx; // posisi absolut kursor

    let newTx = curTx;

    // Kursor melebihi batas kanan → geser kiri
    if (cursorLeft + cursorEl.offsetWidth + 4 > visibleW) {
      newTx = visibleW - cursorEl.offsetLeft - cursorEl.offsetWidth - 4;
    }
    // Kursor di kiri area visible → geser kanan
    if (cursorEl.offsetLeft + newTx < 0) {
      newTx = -cursorEl.offsetLeft + 4;
    }
    // Clamp: tidak lebih dari 0 (tidak geser konten ke kanan melewati awal)
    newTx = Math.min(0, newTx);
    // Clamp: tidak lebih dari batas kiri konten
    if (contentW > visibleW) newTx = Math.max(visibleW - contentW, newTx);

    shapeOverlay.style.transform = `translateX(${Math.round(newTx)}px)`;
  }

  function getCurrentTx() {
    const t = shapeOverlay.style.transform;
    if (!t) return 0;
    const m = t.match(/-?[\d.]+/);
    return m ? parseFloat(m[0]) : 0;
  }

  // Sinkronisasi: setiap kali input asli berubah, render ulang overlay
  realInput.addEventListener('input', () => { renderOverlay(); });
  realInput.addEventListener('keydown', (e) => {
    // Enter → unlock
    if (e.key === 'Enter') { e.preventDefault(); unlock(); return; }
    // Ctrl+A / Cmd+A → select all, lalu render
    if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
      setTimeout(() => {
        realInput.setSelectionRange(0, realInput.value.length);
        renderOverlay();
      }, 0);
      return;
    }
    setTimeout(renderOverlay, 0);
  });
  realInput.addEventListener('keyup',   () => { renderOverlay(); });
  realInput.addEventListener('click',   () => { renderOverlay(); });
  realInput.addEventListener('select',  () => { renderOverlay(); });

  // Klik di area shape display → fokus ke input asli
  document.getElementById('lock-shape-display').addEventListener('click', () => {
    realInput.focus();
    renderOverlay();
  });

  // Toggle show/hide shapes vs chars
  const lockToggleBtn = document.getElementById('lock-toggle');
  const eyeOpen   = document.getElementById('eye-open');
  const eyeClosed = document.getElementById('eye-closed');

  lockToggleBtn.addEventListener('click', () => {
    showChars = !showChars;
    // Penting: ubah type input agar browser expose nilai karakter asli
    // type=password menyembunyikan karakter dari JS di beberapa browser
    realInput.type = showChars ? 'text' : 'password';
    eyeOpen.style.display   = showChars ? 'block' : 'none';
    eyeClosed.style.display = showChars ? 'none'  : 'block';
    renderOverlay();
    // Kembalikan fokus & posisi kursor
    const pos = realInput.selectionStart;
    realInput.focus();
    realInput.setSelectionRange(pos, pos);
  });

  // Fokus/blur: tampilkan/sembunyikan animasi cursor
  realInput.addEventListener('focus', renderOverlay);
  realInput.addEventListener('blur',  () => {
    const c = document.getElementById('lock-cursor-blink');
    if (c) c.style.opacity = '0';
  });

  window.addEventListener('load', () => { realInput.focus(); renderOverlay(); });


  // ── Custom cursor (langsung aktif saat halaman load)
  function initCursor() {
    if (window.innerWidth <= 900) return;
    const ring = document.createElement('div'); ring.id = 'cursor-ring';
    const dot  = document.createElement('div'); dot.id  = 'cursor-dot';
    document.body.appendChild(ring);
    document.body.appendChild(dot);

    let mouseX = -200, mouseY = -200, ringX = -200, ringY = -200;
    const LERP = 0.28;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
      const darkSections = [document.getElementById('cover'), document.getElementById('penutup')].filter(Boolean);
      const isOnDark = darkSections.some(el => {
        const r = el.getBoundingClientRect();
        return mouseY >= r.top && mouseY <= r.bottom && mouseX >= r.left && mouseX <= r.right;
      });
      ring.classList.toggle('on-dark', isOnDark);
      dot.classList.toggle('on-dark', isOnDark);
    });
    const hoverTargets = 'a, button, .nav-item, .card, .sekbid-card, .eval-card, .callout, .sf-box, .bab-header, #lock-btn, #lock-toggle, #lock-input';
    document.addEventListener('mouseover', e => { if (e.target.closest(hoverTargets)) { ring.classList.add('hovering'); dot.classList.add('hovering'); } });
    document.addEventListener('mouseout',  e => { if (e.target.closest(hoverTargets)) { ring.classList.remove('hovering'); dot.classList.remove('hovering'); } });
    document.addEventListener('mousedown', () => ring.classList.add('clicking'));
    document.addEventListener('mouseup',   () => ring.classList.remove('clicking'));
    function animateCursor() {
      ringX += (mouseX - ringX) * LERP; ringY += (mouseY - ringY) * LERP;
      ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();
    document.addEventListener('mouseleave', () => { ring.style.opacity='0'; dot.style.opacity='0'; });
    document.addEventListener('mouseenter', () => { ring.style.opacity='1'; dot.style.opacity='1'; });
    window.addEventListener('resize', () => {
      if (window.innerWidth <= 900) { ring.style.display='none'; dot.style.display='none'; }
      else { ring.style.display=''; dot.style.display=''; }
    });
  }
  initCursor();

  // ── Derive AES-256 key dari password via PBKDF2-SHA256
  async function deriveKey(password, saltBuf) {
    const keyMat = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: saltBuf, iterations: 310000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );
  }

  function b64ToBuf(b64) {
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }

  const lockScreen = document.getElementById('lock-screen');
  const appContent = document.getElementById('app-content');
  const transition = document.getElementById('page-transition');
  const lockInput  = document.getElementById('lock-input');
  const lockBtn    = document.getElementById('lock-btn');
  const lockError  = document.getElementById('lock-error');
  function showError() {
    const sd  = document.getElementById('lock-shape-display');
    const inp = document.getElementById('lock-input');
    if (sd) sd.classList.add('error');
    if (inp) {
      inp.value = '';
      setTimeout(() => { if (sd) sd.classList.remove('error'); }, 500);
      inp.focus();
    }
    shapeAssignments = [];
    if (typeof renderOverlay === 'function') renderOverlay();
    lockError.classList.add('show');
  }

  async function unlock() {
    const password = lockInput.value;
    if (!password) { showError(); return; }

    lockBtn.textContent = 'Mendekripsi…';
    lockBtn.disabled    = true;

    try {
      const payload = document.getElementById('enc-payload');
      const saltBuf = b64ToBuf(payload.dataset.salt);
      const ivBuf   = b64ToBuf(payload.dataset.iv);
      const ctBuf   = b64ToBuf(payload.dataset.ct);

      const key = await deriveKey(password, saltBuf);

      let decrypted;
      try {
        const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: ivBuf }, key, ctBuf);
        decrypted = new TextDecoder().decode(plainBuf);
      } catch(e) {
        lockBtn.textContent = 'Buka Dokumen →';
        lockBtn.disabled    = false;
        showError();
        return;
      }

      // Inject decrypted HTML
      appContent.innerHTML = decrypted;

      // Animate unlock
      lockScreen.classList.add('unlocking');
      setTimeout(() => { transition.classList.add('flash-in'); }, 400);
      setTimeout(() => {
        lockScreen.style.display = 'none';
      const wm = document.getElementById('lock-watermark'); if (wm) wm.style.display = 'none';
        appContent.style.display = 'block';
        void appContent.offsetWidth;
        appContent.classList.add('visible');

        // Init main page JS setelah konten diinjeksikan
        initMainPage();
        setTimeout(runTitleScramble, 500);

        // Restart cover animations
        ['.cover-logo','.cover-tag','.cover-sub'].forEach(sel => {
          const el = document.querySelector(sel);
          if (!el) return;
          el.style.animation = 'none';
          void el.offsetWidth;
          el.style.animation = '';
        });

        transition.classList.remove('flash-in');
        transition.classList.add('flash-out');
        setTimeout(() => { transition.style.display = 'none'; }, 700);
      }, 700);

    } catch(err) {
      lockBtn.textContent = 'Buka Dokumen →';
      lockBtn.disabled    = false;
      showError();
    }
  }


// ── Scramble title word-by-word
function runTitleScramble() {
  const el = document.getElementById('cover-title-scramble');
  if (!el) return;

  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&';
  const GREEN_FROM = 2; // kata ke-3 dst (IRMA SMKN 3 Bogor) jadi hijau
  const fullText = el.textContent.trim();
  const words = fullText.split(' ');

  // Build spans
  // Unhide h1 sekarang (JS sudah siap build spans)
  el.style.visibility = 'visible';

  el.innerHTML = words.map((word, wi) => {
    const isGreen  = wi >= GREEN_FROM;
    const isItalic = wi >= GREEN_FROM;
    const letters  = word.split('').map(ch =>
      `<span class="sc">${ch}</span>`
    ).join('');
    const inner = isItalic
      ? `<em style="font-style:italic">${letters}</em>`
      : letters;
    return `<span class="tw${isGreen ? ' green' : ''}" data-word="${word}">${inner}</span>`;
  }).join(' ');

  // Tambah CSS .green inline agar hijau muda
  if (!document.getElementById('scramble-style')) {
    const s = document.createElement('style');
    s.id = 'scramble-style';
    s.textContent = '#cover-title-scramble .tw.green { color: #a8e6c4; }';
    document.head.appendChild(s);
  }

  const wordEls = el.querySelectorAll('.tw');

  const SLIDE_DURATION = 650; // ms — scramble mulai 650ms setelah kata muncul

  wordEls.forEach((wordEl, wi) => {
    const slideDelay   = wi * 160;       // jeda antar kata muncul
    const scrambleDelay = slideDelay; // scramble mulai BERSAMAAN dengan slide
    const word = words[wi];

    // ── Tahap 1: slide up / fade in
    setTimeout(() => {
      wordEl.classList.add('visible');
    }, slideDelay);

    // ── Tahap 2: scramble huruf spesifik — hanya '3' di kata "3" dan 'g' di kata "Bogor"
    const specificIdx = word === '3' ? 0 : word === 'Bogor' ? 2 : -1;
    if (specificIdx === -1) return; // kata lain tidak di-scramble

    setTimeout(() => {
      const scEls = wordEl.querySelectorAll('.sc');
      const scEl  = scEls[specificIdx];
      if (!scEl) return;
      const original = word[specificIdx];
      let count = 0;
      const maxFlips = 6 + Math.floor(Math.random() * 4); // 6–9 flip
      const interval = setInterval(() => {
        scEl.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
        count++;
        if (count >= maxFlips) {
          clearInterval(interval);
          scEl.textContent = original;
        }
      }, 55);
    }, scrambleDelay);
  });
}

    lockBtn.addEventListener('click', unlock);
  // Keydown on shape display handled in shape JS above
  // Focus handled by shape display on load
})();
</script>
