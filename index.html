/* Ripple */
#theme-ripple {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 99997;
  clip-path: circle(0% at var(--rx,50%) var(--ry,50%));
  transition: none;
  will-change: clip-path;
}
#theme-ripple.ripple-expand  { transition: clip-path 0.58s cubic-bezier(0.4,0,0.2,1); }
#theme-ripple.ripple-full    { clip-path: circle(150% at var(--rx,50%) var(--ry,50%)); }
#theme-ripple.ripple-collapse {
  clip-path: circle(0% at var(--rx,50%) var(--ry,50%));
  transition: clip-path 0.52s cubic-bezier(0.4,0,0.6,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.75;
}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface, #fff);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

.sidebar-brand {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand .logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent-1), #52b788);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: 10px;
}

.sidebar-brand h1 {
  font-family: 'Lora', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}
.sidebar-brand h1 .sc {
  display: inline !important;
}

.sidebar-brand p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 0;
}

.nav-section {
  padding: 4px 14px 2px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 12px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  font-size: 12.5px;
  color: var(--muted);
  text-decoration: none;
  border-radius: 6px;
  margin: 1px 8px;
  transition: all .15s;
  cursor: pointer;
}

.nav-item:hover { background: #f3f2ef; color: var(--text); }
.nav-item.active { background: #eaf4ee; color: var(--accent-1); font-weight: 600; }

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── MAIN ────────────────────────────────────────────────────── */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
}

/* ── COVER ───────────────────────────────────────────────────── */
.cover {
  background: linear-gradient(160deg, #0d3b26 0%, #1a5c3e 40%, #1d4e89 100%);
  padding: 80px 60px 60px;
  color: white;
  position: relative;
  overflow: hidden;
}

.cover-bg-img {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1555993539-1732b0258235?w=1600&q=85');
  background-size: cover;
  background-position: center 55%;
  opacity: 0.12;
  mix-blend-mode: luminosity;
  z-index: 0;
  pointer-events: none;
}

.cover::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
  border-radius: 50%;
}

.cover::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 200px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,.04) 0%, transparent 70%);
  border-radius: 50%;
}

.cover-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .05em;
  margin-bottom: 28px;
  color: rgba(255,255,255,.9);
}

.cover h1 {
  font-family: 'Lora', serif;
  font-size: clamp(30px, 4vw, 44px);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 12px;
  max-width: 600px;
}

.cover-inner {
  position: relative;
  z-index: 1;
}

/* Cover logo — centered above badge */
.cover-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}
.cover-logo-circle {
  width: 76px; height: 76px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
.cover-logo-caption {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
  margin-top: 9px;
}

.cover h1 em {
  font-style: normal;
  color: #a8e6c4;
}
#cover-title-scramble {
  visibility: hidden;
}
#cover-title-scramble .tw {
  display: inline-block;
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
}
#cover-title-scramble .tw.visible {
  opacity: 1 !important;
  transform: translateY(0) !important;
}
#cover-title-scramble .tw .sc {
  display: inline-block;
  transition: none;
}


.cover-sub {
  font-size: 16px;
  color: rgba(255,255,255,.7);
  margin-bottom: 36px;
}

.cover-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: rgba(255,255,255,.85);
}
.chip-anim {
  opacity: 0;
  transform: translateY(12px);
  animation: chipIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes chipIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.cover-scroll {
  position: absolute;
  bottom: 24px; right: 40px;
  font-size: 11px;
  color: rgba(255,255,255,.4);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── CONTENT ─────────────────────────────────────────────────── */
.content {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 0 40px 80px;
}

/* ── SECTION / BAB HEADER ────────────────────────────────────── */
.bab {
  margin-top: 64px;
  scroll-margin-top: 24px;
}

.bab-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 14px;
  margin-bottom: 36px;
  padding: 40px 32px 36px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  color: white;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
  margin-left: -8px;
  margin-right: -8px;
}

/* Orb dekoratif kiri-kanan */
.bab-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255,255,255,.09) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.bab-header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -20px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* Per-BAB gradient backgrounds */
#bab1 .bab-header { background: linear-gradient(135deg, #0a2e1c 0%, #1a5c3e 55%, #2d7a52 100%); }
#bab2 .bab-header { background: linear-gradient(135deg, #071a36 0%, #1d4e89 55%, #2563b0 100%); }
#bab3 .bab-header { background: linear-gradient(135deg, #3a1800 0%, #7b3f00 55%, #9e5400 100%); }
#bab4 .bab-header { background: linear-gradient(135deg, #1e0b3d 0%, #5c2d91 55%, #7640b8 100%); }
#bab5 .bab-header { background: linear-gradient(135deg, #4a1500 0%, #b5451b 55%, #d45e2e 100%); }
#bab6 .bab-header { background: linear-gradient(135deg, #051520 0%, #1a5276 55%, #1f6fa0 100%); }
#bab7 .bab-header { background: linear-gradient(135deg, #031a0c 0%, #145a32 55%, #1c7a44 100%); }

.bab-icon {
  width: 68px; height: 68px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
  background: rgba(255,255,255,.18) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.3);
  backdrop-filter: blur(8px);
}

.bab-meta {
  flex: 1;
  width: 100%;
}

.bab-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,.7);
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 4px 14px;
}

.bab h2 {
  font-family: 'Lora', serif;
  font-size: 26px;
  font-weight: 700;
  line-height: 1.3;
  color: white;
  max-width: 560px;
  margin: 0 auto;
  text-shadow: 0 1px 8px rgba(0,0,0,.2);
}

/* Per-BAB colors */
.c1 { color: var(--accent-1); }
.c2 { color: var(--accent-2); }
.c3 { color: var(--accent-3); }
.c4 { color: var(--accent-4); }
.c5 { color: var(--accent-5); }
.c6 { color: var(--accent-6); }
.c7 { color: var(--accent-7); }

.bg1 { background: #eaf4ee; }
.bg2 { background: #e8f0fc; }
.bg3 { background: #f9ede0; }
.bg4 { background: #f2ebff; }
.bg5 { background: #fdeee8; }
.bg6 { background: #e2f0f7; }
.bg7 { background: #e8f5ec; }

/* ── H3 SUB-HEADING ──────────────────────────────────────────── */
.sub-section {
  margin-top: 32px;
  margin-bottom: 12px;
}

.sub-section h3 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sub-section h3::before {
  content: '';
  display: inline-block;
  width: 4px;
  /* height mengikuti font-size teks agar proporsional */
  height: 1em;
  border-radius: 2px;
  background: currentColor;
  opacity: .7;
  flex-shrink: 0;
  /* align ke tengah teks */
  align-self: center;
}

/* ── H4 ──────────────────────────────────────────────────────── */
h4.label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin: 20px 0 8px;
  color: var(--muted);
}

/* ── PROSE ───────────────────────────────────────────────────── */
.prose {
  font-size: 14.5px;
  color: #2e2c28;
  line-height: 1.8;
  margin-bottom: 12px;
}

/* ── LISTS ───────────────────────────────────────────────────── */
.list {
  list-style: none;
  margin: 8px 0 16px;
}

.list li {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 4px 0;
  font-size: 14.5px;
  line-height: 1.7;
}

.list li::before {
  content: '›';
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--muted);
}

.list.numbered { counter-reset: li; }
.list.numbered li::before {
  counter-increment: li;
  content: counter(li) '.';
  font-size: 13px;
  font-weight: 700;
  min-width: 20px;
  color: inherit;
}

.list.sub { margin-left: 24px; }
.list.sub li::before { content: '–'; font-weight: 400; }

/* ── CALLOUT BOX ─────────────────────────────────────────────── */
.callout {
  display: flex;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 10px;
  margin: 16px 0;
  border: 1px solid transparent;
  font-size: 14px;
  line-height: 1.7;
}

.callout-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.callout-body { flex: 1; }
.callout-body strong { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; }

.callout.info { background: #edf4fd; border-color: #c5dcf8; }
.callout.tip  { background: #eaf4ee; border-color: #b2d8c2; }
.callout.warn { background: #fef9e7; border-color: #f5d76e; }
.callout.principle { background: #f3f2ef; border-color: #d9d7d0; }

/* ── HAL YANG DIKOORDINASIKAN – yellow attention card ────────── */
.card-attention {
  background: #fffbea;
  border: 1.5px solid #f5c842;
  border-left: 4px solid #e6b800;
  border-radius: 10px;
  padding: 14px 18px;
  width: 100%;
  box-sizing: border-box;
}

/* ── FLOW / ALUR ─────────────────────────────────────────────── */
.flow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin: 16px 0 20px;
  padding: 20px 24px;
  background: #f7f6f3;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.flow-step {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: auto;
}

.flow-step-box {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
}

.flow-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.flow-text {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  background: var(--surface, #fff);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  white-space: nowrap;
  color: var(--text);
}

.flow-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 2px 0;
  color: #bbb;
  font-size: 18px;
  user-select: none;
}

/* Horizontal flow */
.flow-h {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  margin: 16px 0 20px;
}

.flow-h .fh-step {
  display: flex;
  align-items: center;
  gap: 0;
}

.fh-box {
  background: var(--surface, #fff);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  white-space: nowrap;
}

.fh-arrow { color: #bbb; padding: 0 6px; font-size: 18px; }

/* ── COMPARISON TABLE ────────────────────────────────────────── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0 20px;
  font-size: 13.5px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.compare-table th {
  padding: 12px 16px;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .05em;
  text-align: left;
  color: white;
}

.compare-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}

.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:nth-child(odd) td { background: #fafaf8; }

/* ── INFO CARDS GRID ─────────────────────────────────────────── */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}

.card {
  background: var(--surface, #fff);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.card-title {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 8px;
  color: #1a1915;
  text-align: center;
}

.card ul { list-style: none; }
.card ul li { font-size: 13px; line-height: 1.7; padding: 2px 0; }
.card ul li::before { content: '• '; }

/* ── SEKBID CARD ─────────────────────────────────────────────── */
.sekbid-wrap { margin-top: 24px; }

.sekbid-card {
  background: var(--surface, #fff);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
}

.sekbid-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.sekbid-emoji { font-size: 30px; line-height: 1; }

.sekbid-head-text h4 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  color: var(--text);
  margin: 0;
}

.sekbid-head-text p {
  font-size: 12px;
  color: var(--muted);
}

.sekbid-body {
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

@media(max-width: 700px) {
  .sekbid-body { grid-template-columns: 1fr; }
  .cards { grid-template-columns: 1fr; }
}

.sekbid-col h5 {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #1e1c18;
  margin-bottom: 8px;
  opacity: 0.85;
}

.sekbid-col ul { list-style: none; }
.sekbid-col ul li { font-size: 12.5px; line-height: 1.7; padding: 2px 0; }
.sekbid-col ul li::before { content: '› '; color: var(--muted); font-weight: 700; }

/* ── PRINCIPLE BLOCK ─────────────────────────────────────────── */
.principle-block {
  background: linear-gradient(135deg, #f7f6f3 0%, #f0efec 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 16px 0;
}

.principle-block .p-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.principle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.p-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13.5px;
  line-height: 1.6;
}

.p-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text);
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── TIMELINE TAHAPAN ────────────────────────────────────────── */
.timeline {
  margin: 16px 0;
  position: relative;
  padding-left: 32px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--border);
}

.tl-item {
  position: relative;
  margin-bottom: 24px;
}

.tl-dot {
  position: absolute;
  left: -32px;
  top: 3px;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
}

.tl-title {
  font-size: 14.5px;
  font-weight: 700;
  margin-bottom: 6px;
}

.tl-body { font-size: 13.5px; color: #3a3834; line-height: 1.7; }
.tl-body ul { list-style: none; margin-top: 6px; }
.tl-body ul li { padding: 2px 0; display: flex; gap: 8px; }
.tl-body ul li::before { content: '—'; color: #bbb; flex-shrink: 0; }

/* ── DOC TABLE ───────────────────────────────────────────────── */
.doc-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.doc-table th {
  padding: 10px 14px;
  font-weight: 700;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: .05em;
  text-align: left;
  background: #f0efec;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

.doc-table td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}

.doc-table tr:last-child td { border-bottom: none; }
.doc-table tr:nth-child(even) td { background: #fafaf8; }

/* ── DIVIDER ─────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 32px 0;
}

/* ── PENUTUP ─────────────────────────────────────────────────── */
.closing {
  background: linear-gradient(135deg, #0d3b26 0%, #1a5c3e 100%);
  color: white;
  padding: 48px 40px;
  margin: 48px 0 0;
}

.closing h2 { font-family: 'Lora', serif; font-size: 26px; margin-bottom: 16px; }
.closing p { font-size: 14px; color: rgba(255,255,255,.8); line-height: 1.8; margin-bottom: 16px; }
.closing ul { list-style: none; margin: 12px 0 24px; }
.closing ul li { padding: 4px 0; font-size: 14px; color: rgba(255,255,255,.85); display: flex; gap: 10px; }
.closing ul li::before { content: '✦'; color: #a8e6c4; flex-shrink: 0; }

.sig-box {
  margin-top: 32px;
  display: flex;
  justify-content: flex-end;
}

.sig-inner {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  padding: 20px 32px;
  text-align: center;
  min-width: 220px;
}

.sig-inner p { font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 48px; }
.sig-inner .sig-line { border-top: 1px solid rgba(255,255,255,.4); padding-top: 10px; font-size: 13px; font-weight: 600; }

/* ── SCROLL PROGRESS ─────────────────────────────────────────── */
#progress-bar {
  position: fixed;
  top: 0; left: var(--sidebar-w);
  height: 3px;
  background: linear-gradient(90deg, var(--accent-1), #52b788);
  z-index: 200;
  transition: width .1s;
  width: 0%;
}

/* ── BACK TO TOP — dipindah ke dalam kapsul navigasi ── */

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 0 20px 60px; }
  .cover {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 72px 24px 48px;
  }
  .cover-inner {
    text-align: center;
    width: 100%;
  }
  #progress-bar { left: 0; }
}

/* ── TEXT SELECTION HIGHLIGHT ────────────────────────────────── */
::selection {
  background: rgba(82, 183, 136, 0.32);
  color: inherit;
}
::-moz-selection {
  background: rgba(82, 183, 136, 0.32);
  color: inherit;
}

/* ── CUSTOM CURSOR (desktop only) ────────────────────────────── */
@media (min-width: 901px) {
  #app-content *, #lock-screen * { cursor: none !important; }

  #cursor-ring {
    position: fixed;
    top: 0; left: 0;
    width: 38px; height: 38px;
    border: 1.5px solid rgba(45, 106, 79, 0.65);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    will-change: transform;
    mix-blend-mode: multiply;
    box-shadow: none;
    transition:
      width       0.18s cubic-bezier(0.22, 1, 0.36, 1),
      height      0.18s cubic-bezier(0.22, 1, 0.36, 1),
      border-color 0.18s ease,
      background  0.18s ease,
      box-shadow  0.22s ease;
  }

  #cursor-dot {
    position: fixed;
    top: 0; left: 0;
    width: 5px; height: 5px;
    background: rgba(45, 106, 79, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    will-change: transform;
    transition:
      width  0.18s cubic-bezier(0.22, 1, 0.36, 1),
      height 0.18s cubic-bezier(0.22, 1, 0.36, 1),
      background 0.18s ease,
      box-shadow 0.22s ease;
  }

  /* ── HOVER: ring lebih besar + glow hijau, dot ikut membesar ── */
  #cursor-ring.hovering {
    width: 60px; height: 60px;
    border-color: rgba(82, 183, 136, 0.75);
    background: rgba(82, 183, 136, 0.07);
    box-shadow:
      0 0 0   4px rgba(82, 183, 136, 0.10),
      0 0 14px 6px rgba(82, 183, 136, 0.18),
      0 0 28px 10px rgba(82, 183, 136, 0.08);
  }

  /* Dot ikut membesar saat hover */
  #cursor-dot.hovering {
    width: 8px; height: 8px;
    background: rgba(45, 106, 79, 1);
    box-shadow: 0 0 6px 3px rgba(82, 183, 136, 0.45);
  }

  /* ── CLICK: ring menyusut tajam ─────────────────────────────── */
  #cursor-ring.clicking {
    width: 22px; height: 22px;
    border-color: rgba(45, 106, 79, 1);
    background: rgba(45, 106, 79, 0.12);
    box-shadow:
      0 0 0  2px rgba(45, 106, 79, 0.15),
      0 0 8px 4px rgba(45, 106, 79, 0.20);
    transition-duration: 0.07s;
  }

  /* ── ON COVER: warna hijau muda ─────────────────────────────── */
  /* ── ON DARK SECTIONS (cover & penutup): warna putih ───────── */
  #cursor-ring.on-dark {
    border-color: rgba(255, 255, 255, 0.80);
    width: 46px; height: 46px;
    background: rgba(255, 255, 255, 0.05);
    box-shadow:
      0 0 10px 4px rgba(255, 255, 255, 0.12),
      0 0 22px 8px rgba(255, 255, 255, 0.06);
    transition:
      width       0.18s cubic-bezier(0.22, 1, 0.36, 1),
      height      0.18s cubic-bezier(0.22, 1, 0.36, 1),
      border-color 0.22s ease,
      background  0.22s ease,
      box-shadow  0.25s ease;
  }

  #cursor-dot.on-dark {
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 0 5px 2px rgba(255, 255, 255, 0.35);
  }

  /* ON DARK + HOVERING: glow putih lebih terang */
  #cursor-ring.on-dark.hovering {
    width: 62px; height: 62px;
    border-color: rgba(255, 255, 255, 0.95);
    background: rgba(255, 255, 255, 0.08);
    box-shadow:
      0 0 0   4px rgba(255, 255, 255, 0.10),
      0 0 16px 7px rgba(255, 255, 255, 0.20),
      0 0 32px 14px rgba(255, 255, 255, 0.08);
  }

  #cursor-dot.on-dark.hovering {
    width: 8px; height: 8px;
    background: rgba(255, 255, 255, 1);
    box-shadow: 0 0 8px 4px rgba(255, 255, 255, 0.50);
  }
}

/* ── ANIMATIONS ──────────────────────────────────────────────── */

/* Cover entrance */
@keyframes coverTag {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

  to   { opacity: 1; transform: translateY(0); }
}
/* title-word removed */
@keyframes coverTitle {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverSub {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes coverChips {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cover-logo  { animation: none; }
.cover-tag   { animation: none; }
.cover h1    { animation: none; }
.cover-sub   { animation: none; }
.cover-chips { animation: none; }

/* Cover animations only fire after unlock */
#app-content.visible .cover-logo  { animation: coverTag   1.2s cubic-bezier(0.22, 1, 0.36, 1) 0s    both; }
#app-content.visible .cover-tag   { animation: coverTag   1.3s cubic-bezier(0.22, 1, 0.36, 1) 0.3s  both; }
#app-content.visible .cover h1    { animation: none; }
#app-content.visible .cover-sub   { animation: coverSub   1.3s cubic-bezier(0.22, 1, 0.36, 1) 1.05s both; }
#app-content.visible .cover-chips { animation: none; } /* chip-anim per item */

/* Scroll-reveal base — soft, generous, breathable */
.reveal {
  opacity: 0;
  transform: translateY(44px);
  will-change: opacity, transform;
  transition:
    opacity  1.1s cubic-bezier(0.22, 1, 0.36, 1),
    transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
}
.reveal.revealed {
  opacity: 1;
  transform: translateY(0);
}

/* Staggered grid children */
.reveal-group > * {
  opacity: 0;
  transform: translateY(36px);
  will-change: opacity, transform;
  transition:
    opacity  1s cubic-bezier(0.22, 1, 0.36, 1),
    transform 1s cubic-bezier(0.22, 1, 0.36, 1);
}
.reveal-group.revealed > *:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:.08s; }
.reveal-group.revealed > *:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:.20s; }
.reveal-group.revealed > *:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:.32s; }
.reveal-group.revealed > *:nth-child(4) { opacity:1; transform:translateY(0); transition-delay:.44s; }
.reveal-group.revealed > *:nth-child(5) { opacity:1; transform:translateY(0); transition-delay:.56s; }
.reveal-group.revealed > *:nth-child(6) { opacity:1; transform:translateY(0); transition-delay:.68s; }
.reveal-group.revealed > *:nth-child(7) { opacity:1; transform:translateY(0); transition-delay:.80s; }

.bab { animation: none; }

/* ══════════════════════════════════════════════════════════════
   INNER BOX ANIMATIONS — slow, cinematic, organic
══════════════════════════════════════════════════════════════ */

/* Easing presets (used via animation shorthand below)
   --ease-out-expo : cubic-bezier(0.22, 1, 0.36, 1)   — ease out expo, fast start, smooth glide (Apple/Linear style)
   --ease-spring   : cubic-bezier(0.22, 1, 0.36, 1) — slight overshoot
   --ease-silk     : cubic-bezier(0.22, 1, 0.36, 1)   — ultra-smooth landing
*/

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUpFar {
  from { opacity: 0; transform: translateY(38px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes scalePop {
  0%   { opacity: 0; transform: scale(0.72); }
  70%  { opacity: 1; transform: scale(1.06); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes lineGrow {
  from { transform: scaleX(0); opacity: 0; }
  to   { transform: scaleX(1); opacity: 0.6; }
}
@keyframes numberPop {
  0%   { opacity: 0; transform: scale(0.4) rotate(-20deg); }
  65%  { opacity: 1; transform: scale(1.1) rotate(4deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* ─ BAB header — cinematic entrance ──────────────────────── */
.bab-header.revealed .bab-icon {

}

.card.revealed ul li:nth-child(3)  { animation: slideRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.56s both; }

/* ─ Hover micro-interactions on interactive boxes ──────── */
.card {
  transition: transform 0.2s cubic-bezier(.34,1.2,.64,1), box-shadow 0.2s ease;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.10);
}
.sekbid-card {
  transition: box-shadow 0.2s ease;
}
.sekbid-card:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,.08);
}
.eval-card {
  transition: transform 0.2s cubic-bezier(.34,1.2,.64,1), box-shadow 0.2s ease;
}
.eval-card:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 20px rgba(0,0,0,.09);
}
.callout {
  transition: transform 0.2s cubic-bezier(.34,1.2,.64,1);
}
.callout:hover {
  transform: translateX(4px);
}

.tag-added {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #fff3cd;
  border: 1px solid #ffd966;
  color: #7d5a00;
  border-radius: 4px;
  padding: 1px 7px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── RESPONSIVE GRIDS ─────────────────────────────────────────── */
.cards-2 { grid-template-columns: 1fr 1fr; }
.cards-3 { grid-template-columns: 1fr 1fr 1fr; }
.mt-16   { margin-top: 16px; }

/* ── HAMBURGER BUTTON ────────────────────────────────────────── */
.hamburger {
  display: none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 300;
  width: 40px; height: 40px;
  background: var(--surface, #fff);
  border: 1px solid var(--border);
  border-radius: 8px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.hamburger span {
  display: block;
  width: 18px; height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all .25s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── SIDEBAR OVERLAY ─────────────────────────────────────────── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 99;
}

/* ── FLOW-H RESPONSIVE ───────────────────────────────────────── */
.flow-h { flex-wrap: wrap; gap: 6px; }
.flow-h .fh-step { flex-wrap: wrap; }

/* ── TABLE SCROLL WRAP ───────────────────────────────────────── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* ── DIAGRAM ALUR WRAP ───────────────────────────────────────── */
.diagram-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: #f7f6f3;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}
.diagram-inner {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  justify-content: center;
  min-width: 300px;
}

/* ─ 900px: show hamburger, hide sidebar ─────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  .main { margin-left: 0; }
  .content { padding: 0 16px 60px; }
  .cover {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 24px 48px;
  }
  .cover-inner {
    text-align: center;
  }
  .cover h1 {
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
  }
  .cover-chips {
    justify-content: center;
  }
  .cover-scroll {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    right: auto;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(5px); }
  }
  #progress-bar { left: 0; }

  .hamburger { display: flex; }

  .sidebar {
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    width: 260px;
    display: flex;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }

  /* Step-flow vertikal di mobile */
  .step-flow {
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 16px 20px;
  }
  .sf-step {
    flex-direction: column;
    align-items: center;
    gap: 2px;
    width: 100%;
  }
  .sf-box {
    width: 100%;
    white-space: normal;
  }
  .sf-arrow {
    transform: rotate(90deg);
    display: block;
    padding: 2px 0;
  }
}

/* ─ 640px: collapse 3-col → 2-col ──────────────────────────── */
@media (max-width: 640px) {
  .cards-3 { grid-template-columns: 1fr 1fr; }
  .sekbid-body { grid-template-columns: 1fr 1fr; }
  .bab h2 { font-size: 21px; color: white; }
  .cover h1 { font-size: 28px; }
  .cover-sub { font-size: 14px; }
  .closing { padding: 36px 20px; }
  .sig-box { justify-content: center; }
  .principle-grid { grid-template-columns: 1fr; }
  .compare-table { font-size: 12px; }
  .compare-table th, .compare-table td { padding: 8px 10px; }
}

/* ─ 480px: fully single column ─────────────────────────────── */
@media (max-width: 480px) {
  .cards   { grid-template-columns: 1fr !important; }
  .cards-2 { grid-template-columns: 1fr; }
  .cards-3 { grid-template-columns: 1fr; }
  .sekbid-body { grid-template-columns: 1fr; }
  .flow-h { flex-direction: column; align-items: flex-start; gap: 4px; }
  .flow-h .fh-arrow { transform: rotate(90deg); padding: 2px 0 2px 12px; }
  .fh-box { white-space: normal; width: 100%; text-align: left; }
  .cover { padding: 72px 20px 56px; }
  .cover-chips { gap: 6px; }
  .chip { font-size: 11px; padding: 4px 10px; }
  .bab-icon { width: 40px; height: 40px; font-size: 20px; }
  .bab h2 { font-size: 19px; color: white; }
  .content { padding: 0 12px 60px; }
  .tl-title { font-size: 13.5px; }
  .tl-body { font-size: 12.5px; }
  .prose { font-size: 13.5px; }
  .list li { font-size: 13.5px; }
}

/* ── STEP FLOW (replaces flow-h) ─────────────────────────────── */
.step-flow {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin: 14px 0 20px;
  justify-content: center;
  background: #f7f6f3;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
}

.sf-step {
  display: flex;
  align-items: center;
  gap: 6px;
}

.sf-box {
  background: var(--surface, #fff);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  text-align: center;
  white-space: nowrap;
}

.sf-box.accent { background: #eaf4ee; border-color: #b2d8c2; color: var(--accent-1); }
.sf-box.accent-blue { background: #e8f0fc; border-color: #c5dcf8; color: var(--accent-2); }
.sf-box.accent-yellow { background: #fff9e6; border-color: #ffe08a; color: #7d5a00; }
.sf-box.accent-orange { background: #fdeee8; border-color: #f1b49a; color: var(--accent-5); }

.sf-arrow {
  color: #bbb;
  font-size: 16px;
  flex-shrink: 0;
  line-height: 1;
}

/* Vertical step-flow (inside card, for alur koordinasi) */
.step-flow-v {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin: 8px 0;
}

.sfv-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.sfv-box {
  background: var(--surface, #fff);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  width: auto;
  white-space: nowrap;
}

.sfv-arrow {
  color: #bbb;
  font-size: 14px;
  padding: 2px 0;
  text-align: center;
}

/* ── EVAL ICON GRID ──────────────────────────────────────────── */
.eval-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 16px 0;
}

.eval-card {
  background: var(--surface, #fff);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.eval-card .ec-icon { font-size: 28px; margin-bottom: 8px; }
.eval-card .ec-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.eval-card .ec-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

@media (max-width: 640px) {
  .eval-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .eval-grid { grid-template-columns: 1fr; }
}


/* bab-label and h2 inside dark header override color classes */
.bab-header .c1,
.bab-header .c2,
.bab-header .c3,
.bab-header .c4,
.bab-header .c5,
.bab-header .c6,
.bab-header .c7 {
  color: rgba(255,255,255,.75);
}

/* ── COVER LOGO: hidden on desktop, visible on mobile ─────────── */
@media (min-width: 901px) {
  .cover-logo { display: none !important; }
}

/* ── SEKBID LETTER BADGE ─────────────────────────────────────── */
.sekbid-head {
  position: relative;
}

.sekbid-letter-badge {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.12);
  color: white;
  font-size: 12px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  letter-spacing: 0;
  text-transform: uppercase;
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  border: 2px solid rgba(255,255,255,0.55);
}

.sekbid-head-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

/* ── CENTERED CARD TITLE (emoji + text) ──────────────────────── */
.card-title {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 4px;
}

.card-title .ct-emoji {
  font-size: 22px;
  line-height: 1;
  display: block;
  margin-bottom: 2px;

/* Override for cards that already have emoji as sibling div */
.card > [style*="font-size:28px"],
.card > [style*="font-size:24px"] {
  text-align: center;
}

/* ══════════════════════════════════════════════════════════════
   LOCK SCREEN
══════════════════════════════════════════════════════════════ */
/* ── Lock screen theme toggle ───────────────────────────── */
#lock-theme-btn {
  position: fixed;
  left: 50%;
  /* JS akan set top secara dinamis */
  transform: translateX(-50%);
  z-index: 100001;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: rgba(21,27,39,0.82);
  backdrop-filter: blur(16px) saturate(1.8);
  -webkit-backdrop-filter: blur(16px) saturate(1.8);
  border: 1px solid rgba(99,102,241,0.35);
  border-radius: 999px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.3s ease;
  box-shadow: 0 2px 16px rgba(99,102,241,0.25),
              inset 0 1px 0 rgba(179,157,255,0.1);
}
#lock-theme-btn:hover  { background: rgba(30,38,60,0.9); }
#lock-theme-btn:active { opacity: 0.8; }

/* Dark lock screen */
body.dark #lock-screen {
  background: #080c14;
  transition: background 0s;
}
body.dark #lock-bg {
  filter: grayscale(100%) brightness(0.3) contrast(1.2);
  opacity: 0.35;
}
body.dark #lock-screen::before {
  background: radial-gradient(circle, rgba(99,102,241,.12) 0%, transparent 70%);
}
body.dark #lock-screen::after {
  background: radial-gradient(circle, rgba(179,157,255,.08) 0%, transparent 70%);
}
body.dark #lock-card {
  background: rgba(21,27,39,0.75);
  border-color: rgba(99,102,241,0.25);
  box-shadow: 0 8px 40px rgba(0,0,0,.6),
              0 2px 8px rgba(0,0,0,.4),
              inset 0 1px 0 rgba(179,157,255,.15);
}
body.dark #lock-org-name { color: #c5cce6; }
body.dark #lock-org-sub  { color: #6b7a9e; }
body.dark #lock-title    { color: #e8eaf6; }
body.dark #lock-desc     { color: #9fa8c7; }
body.dark #lock-desc strong { color: #c5cce6; }
body.dark #lock-hint     { color: #6b7a9e; }
body.dark #lock-error    { color: #f87171 !important; }

/* Shape display di dark */
body.dark #lock-shape-display {
  background: rgba(15,20,35,0.7);
  border-color: rgba(99,102,241,0.35);
}
body.dark #lock-shape-placeholder { color: #4a5580; }
body.dark .shape-token.selected   { background: rgba(99,102,241,0.2) !important; outline-color: rgba(99,102,241,0.5) !important; }

/* Lock button di dark */
body.dark #lock-btn {
  background: linear-gradient(135deg, #4338ca, #6366f1);
  box-shadow: 0 4px 20px rgba(99,102,241,0.4);
}
body.dark #lock-btn:hover {
  background: linear-gradient(135deg, #3730a3, #4f46e5);
}

/* Lock theme btn di dark */
body.dark #lock-theme-btn {
  background: rgba(21,27,39,0.7);
  border-color: rgba(99,102,241,0.3);
  color: #ffc46b;
}
body.dark #lock-theme-btn:hover { background: rgba(30,38,60,0.8); }

#lock-screen {
  position: fixed;
  inset: 0;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #e8e8e4;
  transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
              transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}

#lock-screen.unlocking {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

/* Background image – hitam putih */
#lock-bg {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1555993539-1732b0258235?w=1600&q=85');
  background-size: cover;
  background-position: center 55%;
  filter: grayscale(100%) brightness(0.82) contrast(1.1);
  opacity: 0.22;
  z-index: 0;
}

/* Orbs dekoratif */
#lock-screen::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(100,100,100,.10) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
}
#lock-screen::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -80px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(80,80,80,.07) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
}

/* Frosted glass card */
#lock-card {
  position: relative;
  z-index: 2;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(28px) saturate(1.3);
  -webkit-backdrop-filter: blur(28px) saturate(1.3);
  border: 1.5px solid rgba(255, 255, 255, 0.75);
  border-radius: 32px;
  padding: 48px 44px 36px;
  width: min(420px, calc(100vw - 40px));
  box-shadow:
    0 8px 40px rgba(0,0,0,.14),
    0 2px 8px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes lockCardIn {
  from { opacity: 0; transform: translateY(36px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Logo lingkaran */
#lock-logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 22px;
  animation: lockCardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
}

#lock-logo-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 2px 10px rgba(0,0,0,.10);
  margin-bottom: 12px;
  border: 2.5px solid rgba(255,255,255,.5);
}

#lock-org-name {
  font-family: 'Lora', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #2d4a3c;
  text-align: center;
}

#lock-org-sub {
  font-size: 11px;
  color: #6b7c72;
  text-align: center;
  margin-top: 3px;
  letter-spacing: .04em;
}

/* Judul kartu */
#lock-title {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 700;
  color: #1a1915;
  text-align: center;
  margin-bottom: 6px;
  animation: lockCardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
}

#lock-desc {
  font-size: 13px;
  color: #6b6860;
  text-align: center;
  margin-bottom: 28px;
  line-height: 1.6;
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both;
}

/* Input group */
/* ── Lock input wrap ── */
#lock-input-wrap {
  position: relative;
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.42s both;
}

/* Input asli: transparan, hanya menutupi area teks (bukan area tombol mata) */
#lock-input {
  position: absolute;
  top: 0; left: 0;
  width: calc(100% - 52px); height: 100%;
  opacity: 0;
  cursor: text;
  border: none;
  background: transparent;
  outline: none;
  padding: 0 8px 0 20px;
  box-sizing: border-box;
  font-size: 14.5px;
  color: transparent;
  caret-color: transparent;
  z-index: 3;
}

/* Shape overlay: visual, di belakang input, tidak memblokir klik */
#lock-shape-display {
  position: relative;
  width: 100%; height: 52px;
  padding: 0 52px 0 20px;
  border-radius: 50px;
  border: 2px solid rgba(45,106,79,.22);
  background: rgba(255,255,255,.85);
  outline: none;
  box-shadow: 0 2px 12px rgba(0,0,0,.06), inset 0 1px 3px rgba(0,0,0,.04);
  transition: border-color .2s, box-shadow .2s;
  display: flex;
  align-items: center;
  overflow: hidden;
  box-sizing: border-box;
  pointer-events: none;
  user-select: none;
  z-index: 1;
}

#lock-input:focus ~ #lock-shape-display {
  border-color: rgba(45,106,79,.6);
  box-shadow: 0 0 0 4px rgba(45,106,79,.12), 0 2px 12px rgba(0,0,0,.06);
}
#lock-shape-display.error {
  border-color: rgba(181,69,27,.5);
  box-shadow: 0 0 0 4px rgba(181,69,27,.10);
  animation: lockShake 0.45s cubic-bezier(.36,.07,.19,.97);
}

#lock-shape-placeholder {
  color: #b0aba3;
  font-size: 14.5px;
  pointer-events: none;
  position: absolute;
  left: 20px;
}

#lock-shape-overlay {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  gap: 6px;
  min-width: 0;
  will-change: transform;
  transition: transform 0.08s ease;
}

/* Cursor dibuat dinamis oleh JS di dalam #lock-shape-overlay */
@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Individual shape tokens */
.shape-token {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
  animation: shapePop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  border-radius: 4px;
  padding: 2px 1px;
}
.shape-token.selected {
  background: rgba(45, 106, 79, 0.25);
  border-radius: 4px;
  outline: 1.5px solid rgba(45, 106, 79, 0.45);
  outline-offset: 0px;
}
.shape-token.selected.show-char {
  color: #1b4332;
}
@keyframes shapePop {
  from { transform: scale(0) rotate(-30deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
.shape-token.show-char {
  font-size: 13px;
  font-family: monospace;
  color: #2d6a4f;
  font-weight: 700;
  min-width: 14px;
  text-align: center;
}
.shape-token svg {
  overflow: visible;
}

#lock-input.error {
  /* keep for JS compat */
}

@keyframes lockShake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  35% { transform: translateX(8px); }
  55% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Toggle visibility icon */
#lock-toggle {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #9a9590;
  font-size: 18px;
  padding: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s;
  z-index: 10;
  pointer-events: all;
}
#lock-toggle:hover { color: #2d6a4f; }

/* Error message */
#lock-error {
  font-size: 12.5px;
  color: #b5451b;
  text-align: center;
  margin-top: 0;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity .2s, transform .2s, max-height .2s, margin-top .2s;
  font-weight: 500;
}
#lock-error.show { opacity: 1; transform: translateY(0); max-height: 40px; margin-top: 10px; }

/* Submit button */
#lock-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 14px 24px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #1a4a30 0%, #2d6a4f 55%, #3a8a63 100%);
  color: white;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14.5px;
  font-weight: 700;
  letter-spacing: .03em;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(45,106,79,.35), 0 1px 4px rgba(0,0,0,.10);
  transition: box-shadow .2s, transform .15s, opacity .2s;
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.52s both;
}
#lock-btn:hover {
  box-shadow: 0 6px 28px rgba(45,106,79,.45), 0 2px 8px rgba(0,0,0,.12);
  transform: translateY(-1px);
}
#lock-btn:active { transform: translateY(0); opacity: .9; }

/* Lock divider */
#lock-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0 0;
  animation: lockCardIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
}
#lock-divider::before, #lock-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(0,0,0,.10);
}
#lock-divider span {
  font-size: 11px;
  color: #a0a09a;
  letter-spacing: .06em;
}

/* ── PAGE TRANSITION OVERLAY ────────────────────────────────── */
#page-transition {
  position: fixed;
  inset: 0;
  z-index: 99998;
  background: linear-gradient(160deg, #0d3b26 0%, #1a5c3e 50%, #1d4e89 100%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#page-transition.flash-in {
  opacity: 1;
  transition: opacity 0.3s ease;
}
#page-transition.flash-out {
  opacity: 0;
  transition: opacity 0.5s ease 0.1s;
}

/* ── MAIN CONTENT — hidden until unlock ─────────────────────── */
#app-content {
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
#app-content.visible { opacity: 1; }

#bab-indicator {
  position: fixed;
  bottom: 24px;
  left: calc(260px + (100vw - 260px) / 2);
  transform: translateX(-50%);
  z-index: 9000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s cubic-bezier(0.22,1,0.36,1);
}
#bab-indicator.shown {
  opacity: 1;
  pointer-events: auto;
}
/* Wrap: translateY untuk slide animation */
#bab-indicator-wrap {
  display: inline-block;
  transform: translateY(18px);
  transition: transform 0.45s cubic-bezier(0.34,1.4,0.64,1);
}
#bab-indicator.shown #bab-indicator-wrap {
  transform: translateY(0);
}

/* Kapsul utama */
#bab-indicator-glass {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px 7px 10px;
  /* Base: putih semi-transparan agar selalu terbaca */
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border: 1px solid rgba(255,255,255,0.65);
  border-radius: 999px;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.12),
    inset 0 1.5px 0 rgba(255,255,255,0.9),
    inset 0 -1px 0 rgba(0,0,0,0.05);
  pointer-events: auto;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  user-select: none;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  /* overflow hidden untuk clip konten saat ada animasi */
  overflow: hidden;
}

/* Dark bg: background gelap, teks putih */
#bab-indicator-glass.on-dark {
  background: rgba(10,20,15,0.62);
  border-color: rgba(255,255,255,0.18);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35),
              inset 0 1px 0 rgba(255,255,255,0.10);
}
#bab-indicator-glass.on-dark #bab-active-label { color: rgba(255,255,255,0.93); }
#bab-indicator-glass.on-dark .bab-mini-dot     { background: rgba(255,255,255,0.28); }
#bab-indicator-glass.on-dark .bab-mini-dot.active { background: rgba(255,255,255,0.92); }
#bab-indicator-glass.on-dark #bab-sep          { background: rgba(255,255,255,0.22); }
#bab-indicator-glass.on-dark #bab-dot          { background: #a8e6c4; box-shadow: none; }

/* Mini dots */
#bab-dots { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.bab-mini-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(45,106,79,0.25);
  transition: background 0.3s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink: 0;
  cursor: pointer;
}
.bab-mini-dot.active { background: rgba(45,106,79,0.85); transform: scale(1.4); }

/* Separator */
#bab-sep { width:1px; height:11px; background:rgba(45,106,79,0.2); flex-shrink:0; }

/* ── Scroll-to-top dalam kapsul ── */
#bab-scroll-sep {
  width: 1px;
  height: 14px;
  background: rgba(45,106,79,0.22);
  flex-shrink: 0;
  margin: 0 2px;
  opacity: 0;
  transform: scaleY(0.4);
  transition: opacity 0.28s cubic-bezier(0.22,1,0.36,1),
              transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
}
#bab-scroll-sep.visible {
  opacity: 1;
  transform: scaleY(1);
}
#bab-scroll-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  width: 0;
  height: 20px;
  overflow: hidden;
  opacity: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: width 0.38s cubic-bezier(0.34,1.56,0.64,1),
              opacity 0.25s cubic-bezier(0.22,1,0.36,1);
}
#bab-scroll-btn.visible {
  width: 26px;
  opacity: 1;
}
#bab-scroll-btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  stroke: #2d6a4f;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  transition: stroke 0.18s ease,
              transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
#bab-scroll-btn:hover svg { stroke: #1b4332; transform: translateY(-2px); }
#bab-scroll-btn:active svg { transform: translateY(-4px) scale(0.9); }
#bab-indicator-glass.on-dark #bab-scroll-sep { background: rgba(255,255,255,0.22); }
#bab-indicator-glass.on-dark #bab-scroll-btn svg { stroke: rgba(255,255,255,0.85); }
#bab-indicator-glass.on-dark #bab-scroll-btn:hover svg { stroke: white; }

/* Theme toggle inside capsule */
#bab-theme-sep {
  width: 1px; height: 14px;
  background: rgba(45,106,79,0.22);
  flex-shrink: 0; margin: 0 2px;
  opacity: 0; transform: scaleY(0.4);
  transition: opacity 0.28s cubic-bezier(0.22,1,0.36,1),
              transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
}
#bab-theme-sep.visible { opacity:1; transform:scaleY(1); }
#bab-theme-btn {
  background: none; border: none; cursor: pointer;
  padding: 0; width: 22px; height: 20px;
  font-size: 13px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
#bab-theme-btn:hover  { transform: scale(1.2); }
#bab-theme-btn:active { transform: scale(0.88); }
#bab-indicator-glass.on-dark #bab-theme-sep { background: rgba(255,255,255,0.22); }

/* Dot aktif */
#bab-dot {
  width:6px; height:6px; border-radius:50%;
  background:#2d6a4f; flex-shrink:0;
  transition: background 0.3s;
}

/* Label aktif */
#bab-active-label {
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .02em;
  color: #1b4332;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: opacity 0.18s, transform 0.22s cubic-bezier(0.22,1,0.36,1);
}
#bab-active-label.changing { opacity:0; transform:translateY(5px); }

/* ── Dropdown list ──────────────────────────────────── */
/* Dropdown: jadi child #bab-indicator langsung (bukan glass)
   supaya backdrop-filter bekerja bebas dari stacking context glass */
#bab-dropdown {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  min-width: 230px;
  padding: 6px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(48px) saturate(2.8) brightness(1.08);
  -webkit-backdrop-filter: blur(48px) saturate(2.8) brightness(1.08);
  border: 1px solid rgba(255,255,255,0.75);
  border-radius: 18px;
  box-shadow:
    0 8px 48px rgba(0,0,0,0.18),
    inset 0 1.5px 0 rgba(255,255,255,0.95),
    inset 0 -1px 0 rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
  gap: 1px;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  z-index: 10000;
  transition: opacity 0.25s cubic-bezier(0.22,1,0.36,1),
              transform 0.28s cubic-bezier(0.22,1,0.36,1),
              visibility 0s linear 0.28s;
}
#bab-dropdown.open {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
  transition: opacity 0.25s cubic-bezier(0.22,1,0.36,1),
              transform 0.28s cubic-bezier(0.22,1,0.36,1),
              visibility 0s linear 0s;
}
/* Dark mode dropdown */
#bab-indicator.on-dark #bab-dropdown {
  background: rgba(10,20,14,0.72);
  border-color: rgba(255,255,255,0.14);
  box-shadow: 0 8px 48px rgba(0,0,0,0.55),
              inset 0 1px 0 rgba(255,255,255,0.07);
}
#bab-indicator.on-dark .bab-dd-item       { color: rgba(255,255,255,0.82); }
#bab-indicator.on-dark .bab-dd-item:hover { background: rgba(255,255,255,0.09); }
#bab-indicator.on-dark .bab-dd-item.active { color:#fff; background:rgba(255,255,255,0.13); }
#bab-indicator.on-dark .bab-dd-sep        { background: rgba(255,255,255,0.10); }
#bab-indicator-glass.on-dark .bab-dd-item       { color: rgba(255,255,255,0.82); }
#bab-indicator-glass.on-dark .bab-dd-item:hover { background: rgba(255,255,255,0.09); }
#bab-indicator-glass.on-dark .bab-dd-item.active { color:#fff; background:rgba(255,255,255,0.13); }
#bab-indicator-glass.on-dark .bab-dd-sep        { background: rgba(255,255,255,0.10); }

/* Dropdown items */
.bab-dd-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; border-radius: 11px;
  font-size: 11.5px; font-weight: 500;
  color: #2d3a30; cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.bab-dd-item:hover  { background: rgba(45,106,79,0.09); }
.bab-dd-item.active { background: rgba(45,106,79,0.13); font-weight:700; color:#1b4332; }
.bab-dd-dot { width:6px; height:6px; border-radius:50%; background:rgba(45,106,79,0.2); flex-shrink:0; }
.bab-dd-item.active .bab-dd-dot { background:#2d6a4f; }
.bab-dd-sep { height:1px; background:rgba(45,106,79,0.1); margin:3px 6px; }

/* Mobile: kapsul center layar penuh */
@media (max-width: 900px) {
  #bab-indicator {
    bottom: 18px;
    left: 50% !important;
    transform: translateX(-50%) !important;
    z-index: 9999 !important;
  }
  #bab-indicator-glass { padding:6px 12px 6px 9px; gap:6px; }
  #bab-active-label { font-size:11px; }
  #bab-dropdown { min-width:200px; }

  /* Lock screen toggle di mobile: floating pojok kanan bawah */
  #lock-theme-btn {
    left: auto !important;
    right: 20px !important;
    bottom: 24px !important;
    top: auto !important;
    transform: none !important;
    margin-top: 0 !important;
    width: 44px !important; height: 44px !important;
    font-size: 18px !important;
    box-shadow: 0 6px 24px rgba(99,102,241,0.35),
                inset 0 1px 0 rgba(179,157,255,0.15) !important;
  }
  #lock-theme-btn:hover  { transform: scale(1.1) !important; }
  #lock-theme-btn:active { transform: scale(0.9) !important; }
}
/* ══════════════════════════════════════════════════════
   DARK MODE — WCAG AA Contrast Fixes
   Semua teks: min 4.5:1 vs background
   bg #0e1117 → text #e8eaf6 = ~14:1 ✓
   bg #151b27 → text #e8eaf6 = ~12:1 ✓
   bg #1c2438 → text #9fa8c7 = ~5.2:1 ✓
   ══════════════════════════════════════════════════════ */

/* Base text selalu terbaca */
body.dark { color: #e8eaf6; }
body.dark p      { color: #c5cce6; }   /* 7.5:1 vs #0e1117 */

body.dark h2, body.dark h3, body.dark h4, body.dark h5 { color: #e8eaf6; }

/* Prose */

/* Cards — teks dalam card */
body.dark .card-title { color: #ffc46b !important; }  /* amber 8:1 vs #151b27 */
body.dark .card ul li { color: #c5cce6 !important; }

/* Sekbid */

/* Eval cards */

/* Callout text */

/* Flow boxes — teks selalu terbaca */
body.dark .flow-text  { color: #e8eaf6 !important; background: #1c2438 !important; border-color: #3a4a6e !important; }
body.dark .fh-box     { color: #e8eaf6 !important; background: #1c2438 !important; border-color: #3a4a6e !important; }
body.dark .sf-box     { color: #e8eaf6 !important; background: #1c2438 !important; border-color: #3a4a6e !important; }

body.dark .sf-box.accent-blue   { color: #93c5fd !important; background: rgba(96,165,250,0.14) !important; }
body.dark .sf-box.accent-yellow { color: #fcd34d !important; background: rgba(252,211,77,0.14) !important; }
body.dark .sf-box.accent-orange { color: #fca5a5 !important; background: rgba(248,113,113,0.14) !important; }
body.dark .flow-arrow, body.dark .sf-arrow, body.dark .fh-arrow { color: #3a4a6e !important; }

/* Tables */
body.dark .compare-table th,

body.dark .compare-table td,

/* Principle */
body.dark .p-title { color: #5c6a8a !important; }
body.dark .p-num   { background: rgba(255,196,107,0.15) !important; color: #ffc46b !important; }
body.dark .p-item  { color: #c5cce6 !important; }

/* Card attention */
body.dark .card-attention { background: rgba(255,196,107,0.08) !important; border-left-color: #ffab3a !important; border-color: rgba(255,196,107,0.2) !important; }

/* Tags */

/* Closing */
body.dark .closing { background: #080b12 !important; }

/* Headings */
body.dark .section-title { color: #e8eaf6 !important; }

/* Divider */

   DARK MODE — Specific element fixes (per feedback)
   ══════════════════════════════════════════════════ */

/* 1. Cover subtitle — abu keputihan */
body.dark .cover-sub { color: rgba(220,225,245,0.72) !important; }

<!-- ══════════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════════ -->
<div id="lock-screen" role="dialog" aria-modal="true" aria-label="Halaman proteksi password">
  <div id="lock-bg"></div>
  <!-- Tombol toggle: posisi JS-driven, tengah antara card bottom dan layar bottom -->
  <button id="lock-theme-btn" title="Toggle dark/light mode">🌙</button>

  <div id="lock-card">
    <div id="lock-logo-wrap">
      <div id="lock-logo-circle"><img src="https://raw.githubusercontent.com/sudrajateguh/Pedoman-IRMA-SMKN-3-Bogor/refs/heads/main/LogoIRMASMKN3Bogor.png" alt="Logo IRMA SMKN 3 Bogor" style="width:100%;height:100%;object-fit:contain;border-radius:50%;"/></div>
      <div id="lock-org-name">IRMA SMKN 3 Bogor</div>
    </div>

    <div id="lock-title">Dokumen Terlindungi 🔒</div>
    <p id="lock-desc">Masukkan kata sandi untuk mengakses<br><strong>Pedoman Kepengurusan IRMA</strong></p>

    <div id="lock-input-wrap">
      <!-- Input asli: transparan di belakang, menangani semua keyboard/cursor -->
      <input
        type="password"
        id="lock-input"
        placeholder=""
        autocomplete="current-password"
        spellcheck="false"
      />
      <!-- Shape overlay: menutup input secara visual, klik diteruskan ke input -->
      <div id="lock-shape-display" aria-hidden="true">
        <span id="lock-shape-placeholder">Masukkan kata sandi…</span>
        <div id="lock-shape-overlay"></div>
